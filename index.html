<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#02060a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Realness">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>Realness — prove a real human is here</title>
<style>
  :root{
    --bg:#06070b; --ink:#f4f6ff; --muted:#8b90a8;
    --green:#22e08a; --red:#ff4d62; --card:#0e1018; --line:#1b1e2b;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{margin:0;background:#02060a;color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",Inter,system-ui,sans-serif;
    transition:background .8s ease;overflow-x:hidden}
  body.green{background:radial-gradient(120% 90% at 50% 64%, rgba(34,224,138,.42), rgba(34,224,138,.06) 45%, transparent 70%),
     radial-gradient(80% 60% at 50% 30%, rgba(11,107,69,.5), transparent 60%), #02060a}
  body.red{background:radial-gradient(120% 90% at 50% 60%, rgba(255,77,98,.28), transparent 62%),
     radial-gradient(70% 50% at 50% 28%, rgba(94,15,28,.55), transparent 60%), #0a0305}

  /* ambient threat field — desktop/projector gutters only; hidden on phones + result screens */
  .ambient{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
  .ambient .grid{position:absolute;inset:0;
    background-image:linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);
    background-size:46px 46px;-webkit-mask:radial-gradient(circle at 50% 50%,transparent 26%,#000 74%);mask:radial-gradient(circle at 50% 50%,transparent 26%,#000 74%)}
  .ambient .glow{position:absolute;top:50%;width:42vw;height:80vh;transform:translateY(-50%);border-radius:50%;filter:blur(45px);animation:breathe 7s ease-in-out infinite}
  .ambient .glow.l{left:-24vw;background:radial-gradient(circle,rgba(255,77,98,.30),transparent 62%)}
  .ambient .glow.r{right:-24vw;background:radial-gradient(circle,rgba(255,77,98,.26),transparent 62%);animation-delay:1.6s}
  .ambient .scan{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(255,90,110,.7),transparent);
    box-shadow:0 0 14px rgba(255,77,98,.5);animation:sweep 6.5s linear infinite}
  @keyframes sweep{0%{top:-2%;opacity:0}10%{opacity:1}90%{opacity:1}100%{top:102%;opacity:0}}
  @keyframes breathe{0%,100%{opacity:.55}50%{opacity:1}}
  @media(max-width:760px){.ambient .glow, .ambient .grid{display:none}}  /* phone keeps just the scan line */
  body.green .ambient, body.red .ambient{display:none}
  #app{position:relative;z-index:1;min-height:100%;max-width:480px;margin:0 auto;display:flex;flex-direction:column;
    padding:max(28px,env(safe-area-inset-top)) 24px max(28px,env(safe-area-inset-bottom))}
  .bloomwave{position:fixed;left:50%;top:50%;width:40px;height:40px;border-radius:50%;
    transform:translate(-50%,-50%);z-index:0;pointer-events:none;
    background:radial-gradient(circle, rgba(34,224,138,.6), rgba(34,224,138,.12) 45%, transparent 70%);
    animation:wave 1.15s cubic-bezier(.18,.75,.2,1) forwards}
  @keyframes wave{0%{width:40px;height:40px;opacity:0}25%{opacity:.95}100%{width:1400px;height:1400px;opacity:0}}
  .glyph{width:60px;height:60px;color:#e3e7ff}
  .brand{font-size:13px;letter-spacing:.32em;text-transform:uppercase;color:var(--muted);margin-top:6px}
  h1{font-size:31px;line-height:1.08;letter-spacing:-.02em;margin:16px 0 12px;font-weight:680}
  p.sub{color:var(--muted);font-size:15px;line-height:1.5;margin:0}
  .spacer{flex:1}
  .stack>*+*{margin-top:10px}
  .btn{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;padding:18px;border-radius:18px;
    font-size:16px;font-weight:640;border:none;background:var(--ink);color:#05060a;cursor:pointer}
  .btn:active{transform:scale(.985)}
  .btn.ghost{background:transparent;color:var(--muted);border:1px solid var(--line)}
  .btn:disabled{opacity:.55}
  .link{background:none;border:none;color:var(--muted);font-size:13.5px;text-decoration:underline;
    text-underline-offset:3px;cursor:pointer;padding:8px;width:100%}
  .pill{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;border-radius:999px;font-size:13px;
    background:#12141d;border:1px solid var(--line);color:var(--muted);align-self:flex-start}
  .pill.ok{color:#7dffc0;border-color:#1d4d38;background:#0c1a14}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--muted)}
  .pill.ok .dot{background:var(--green)}
  .center{text-align:center}

  .steps{margin:6px 0}
  .step{display:flex;gap:13px;align-items:flex-start;padding:14px 0;border-bottom:1px solid var(--line)}
  .step:last-child{border-bottom:0}
  .num{width:27px;height:27px;border-radius:50%;flex:0 0 auto;display:grid;place-items:center;font-size:13px;font-weight:700;
    background:#12141d;border:1px solid #2a2f42;color:#cfe9ff}
  .step.g .num{background:#0c1a14;border-color:#1d4d38;color:#7dffc0}
  .step p{margin:0;font-size:14.5px;line-height:1.42;color:#cdd2e4}
  .step .gn{color:#7dffc0}

  .fingerprint{width:84px;height:84px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(160deg,#1a1d29,#0c0e16);border:1px solid #262a3a;font-size:38px;margin:0 auto 20px}

  /* waiting radar */
  .radar{flex:1;display:flex;align-items:center;justify-content:center;position:relative;min-height:230px}
  .ring{position:absolute;border-radius:50%;border:1px solid #20232f;animation:pulse 2.6s ease-out infinite}
  .r1{width:130px;height:130px}.r2{width:210px;height:210px;animation-delay:.5s}.r3{width:290px;height:290px;animation-delay:1s}
  @keyframes pulse{0%{opacity:.7;transform:scale(.8)}100%{opacity:0;transform:scale(1.15)}}
  .qrbox{background:#fff;padding:12px;border-radius:16px;box-shadow:0 10px 40px rgba(0,0,0,.5);position:relative;z-index:2}
  .qrbox svg{display:block;width:150px;height:150px}
  .linkrow{display:flex;gap:8px;align-items:center;background:#0e1018;border:1px solid var(--line);
    border-radius:14px;padding:12px 14px;font-size:13px;color:var(--muted);word-break:break-all}

  /* hero seal */
  .seal{width:132px;height:132px;border-radius:50%;margin:0 auto;display:flex;align-items:center;justify-content:center;
    font-size:62px;color:#02110a}
  .seal.g{background:radial-gradient(circle at 50% 38%, #5dffb0, #14c878 60%, #0b8f55);
    box-shadow:0 0 0 10px rgba(34,224,138,.14), 0 0 90px rgba(34,224,138,.75);animation:bloom .7s cubic-bezier(.2,.9,.25,1)}
  .seal.r{background:radial-gradient(circle at 50% 38%, #ff8a98, #ff4d62 60%, #b41f33);
    box-shadow:0 0 0 10px rgba(255,77,98,.12), 0 0 70px rgba(255,77,98,.5);color:#1a0306;animation:shake .5s}
  @keyframes bloom{0%{transform:scale(.2);opacity:0}60%{transform:scale(1.12)}100%{transform:scale(1);opacity:1}}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-9px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(4px)}}
  .big{font-size:34px;font-weight:720;letter-spacing:-.02em;text-align:center;margin:26px 0 8px}
  .stamp{font-size:14px;letter-spacing:.02em;text-align:center}
  .stamp.g{color:#7dffc0}.stamp.r{color:#ff9aa6}
  .fade{animation:fade .5s ease}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .spin{width:30px;height:30px;border:3px solid #20232f;border-top-color:var(--ink);border-radius:50%;
    animation:rot .8s linear infinite;margin:0 auto}
  @keyframes rot{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="ambient" aria-hidden="true">
  <div class="grid"></div>
  <div class="glow l"></div><div class="glow r"></div>
  <div class="scan"></div>
</div>
<div id="app"></div>

<script src="/vendor/simplewebauthn-browser.umd.min.js"></script>
<script src="/vendor/qrcode.js"></script>
<script>
const WA = window.SimpleWebAuthnBrowser;
const app = document.getElementById('app');
const ENROLL_KEY = 'realness_enrolled';
const isEnrolled = () => localStorage.getItem(ENROLL_KEY) === '1';

function setBg(c){ document.body.className = c || ''; }
function buzz(p){ if (navigator.vibrate) try{ navigator.vibrate(p); }catch(e){} }
function bloom(){ const d = document.createElement('div'); d.className = 'bloomwave';
  document.body.appendChild(d); setTimeout(() => d.remove(), 1300); }
function fmtTime(ts){ const d = ts ? new Date(ts) : new Date();
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false }); }
function glyph(){ return `<svg class="glyph" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
  <path d="M8 22 V13 a5 5 0 0 1 5-5 h9"/><path d="M42 8 h9 a5 5 0 0 1 5 5 v9"/>
  <path d="M56 42 v9 a5 5 0 0 1-5 5 h-9"/><path d="M22 56 h-9 a5 5 0 0 1-5-5 v-9"/>
  <path d="M24 27 v5"/><path d="M40 27 v5"/><path d="M32 28 v9 h-4"/><path d="M24 43 q8 6 16 0"/></svg>`; }
async function post(path, body){
  const r = await fetch(path, {method:'POST', headers:{'content-type':'application/json'}, body:JSON.stringify(body||{})});
  return r.json();
}
async function getJSON(path){ const r = await fetch(path); return r.json(); }

// ---------- screens ----------
function render(html){ setBg(''); app.innerHTML = html; }

function home(){
  render(`
    <div class="brand fade">Realness</div>
    <h1 class="fade">Prove a real human is on the other end.</h1>
    <p class="sub fade">Right now — even 1,000 miles away. No face, no voice. A proof only a live person can give.</p>
    <div class="spacer"></div>
    <div class="steps fade">
      <div class="step"><div class="num">1</div><p>Send a one-time link or QR.</p></div>
      <div class="step"><div class="num">2</div><p>They tap Face&nbsp;ID on their own phone — it never leaves the device.</p></div>
      <div class="step g"><div class="num">3</div><p>Your screen blooms <span class="gn">green</span> — a real, live human, right now.</p></div>
    </div>
    <div class="spacer"></div>
    <span class="pill ${isEnrolled()?'ok':''}"><span class="dot"></span>${isEnrolled()?'This device · verifiable':'This device · not yet verifiable'}</span>
    <div style="height:14px"></div>
    <div class="stack">
      <button class="btn" id="req">Request a handshake</button>
      <button class="btn ghost" id="setup">${isEnrolled()?'Re-run setup':'Become verifiable'}</button>
    </div>
    ${isEnrolled()?'<button class="link" id="reset">Reset this device</button>':''}`);
  document.getElementById('req').onclick = startRequest;
  document.getElementById('setup').onclick = setupScreen;
  const rst = document.getElementById('reset');
  if (rst) rst.onclick = () => { localStorage.removeItem(ENROLL_KEY); home(); };
}

function setupScreen(){
  render(`
    <div class="brand">Set up · one time</div>
    <div class="spacer"></div>
    <div class="fingerprint">${glyph()}</div>
    <h1 class="center">Confirm it's you.</h1>
    <p class="sub center">Your phone makes a secret key locked behind your Face&nbsp;ID / fingerprint. It never leaves this device.</p>
    <div class="spacer"></div>
    <div class="stack">
      <button class="btn" id="go">Use Face ID</button>
      <button class="link" id="back">Back</button>
    </div>`);
  document.getElementById('back').onclick = home;
  document.getElementById('go').onclick = async (e) => {
    e.target.disabled = true; e.target.textContent = 'Waiting for biometric…';
    const ok = await enroll();
    if (ok){ buzz(30); doneSetup(); }
    else { e.target.disabled = false; e.target.textContent = 'Try Face ID again'; }
  };
}
function doneSetup(){
  setBg('green'); bloom();
  render(`
    <div class="spacer"></div>
    <div class="seal g">✓</div>
    <div class="big fade">You're verifiable.</div>
    <p class="stamp g fade">This device can now prove a real human is here.</p>
    <div class="spacer"></div>
    <button class="btn" id="home">Done</button>`);
  setBg('green');
  document.getElementById('home').onclick = home;
}

async function enroll(sessionId){
  try{
    const { flowId, options } = await post('/api/setup/options', sessionId ? { sessionId } : {});
    const att = await WA.startRegistration({ optionsJSON: options });
    const res = await post('/api/setup/verify', { flowId, response: att });
    if (res.verified && (!sessionId || res.completedSession)){
      localStorage.setItem(ENROLL_KEY,'1');
      return true;
    }
    return false;
  }catch(err){ return false; }
}

// ---------- requester ----------
async function startRequest(){
  render(`<div class="spacer"></div><div class="spin"></div><p class="sub center" style="margin-top:16px">Opening handshake…</p><div class="spacer"></div>`);
  const { sessionId } = await post('/api/session/create', {});
  waiting(sessionId);
  poll(sessionId);
}

function waiting(id){
  const url = `${location.origin}/?s=${id}`;
  render(`
    <div class="brand">Handshake · live</div>
    <div class="radar">
      <div class="ring r3"></div><div class="ring r2"></div><div class="ring r1"></div>
      <div class="qrbox" id="qr"></div>
    </div>
    <p class="sub center">Have them scan this. Waiting for a live human to prove they're real…</p>
    <div style="height:16px"></div>
    <div class="linkrow"><span id="lk">${url}</span></div>
    <div style="height:10px"></div>
    <div class="stack">
      <button class="btn" id="copy">Copy link to send</button>
      <button class="link" id="cancel">Cancel</button>
    </div>`);
  const qr = qrcode(0, 'M'); qr.addData(url); qr.make();
  document.getElementById('qr').innerHTML = qr.createSvgTag({ cellSize: 5, margin: 0 });
  document.getElementById('copy').onclick = async (e)=>{
    try{ await navigator.clipboard.writeText(url); e.target.textContent='Copied ✓'; }catch(_){}
  };
  document.getElementById('cancel').onclick = home;
}

function poll(id){
  const deadline = Date.now() + 90000;
  const tick = async () => {
    let data = { status: 'pending' };
    try{ data = await getJSON('/api/session/' + id); }catch(e){}
    if (data.status === 'verified') return green(data.verifiedAt);
    if (data.status === 'failed')   return red('No live human proof. Treat as unverified.');
    if (Date.now() > deadline) return red('No one completed a live proof. Treat as unverified.');
    setTimeout(tick, 1200);
  };
  tick();
}

function green(verifiedAt){
  setBg('green'); bloom(); buzz([20,40,30]);
  render(`
    <div class="spacer"></div>
    <div class="seal g">✓</div>
    <div class="big fade">Verified human</div>
    <p class="stamp g fade">A real, live person — just now.</p>
    <p class="stamp g fade" style="opacity:.5;margin-top:6px;letter-spacing:.1em;font-variant-numeric:tabular-nums">VERIFIED ${fmtTime(verifiedAt)}</p>
    <div class="spacer"></div>
    <button class="btn" id="again" style="background:#1affa0">Done</button>`);
  setBg('green');
  document.getElementById('again').onclick = home;
}
function red(msg){
  buzz([60,30,60]);
  render(`
    <div class="spacer"></div>
    <div class="seal r">✕</div>
    <div class="big fade">Could not verify a human</div>
    <p class="stamp r fade">${msg||'Unverified.'}</p>
    <div class="spacer"></div>
    <button class="btn ghost" id="again">Try again</button>`);
  setBg('red');
  document.getElementById('again').onclick = home;
}

// ---------- responder ----------
function responder(sessionId){
  render(`
    <div class="brand">Realness</div>
    <div class="spacer"></div>
    <div class="fingerprint">${glyph()}</div>
    <h1 class="center">Someone wants to verify you're a real human.</h1>
    <p class="sub center">Prove it with your own biometric on your own phone. Your face never leaves this device.</p>
    <div class="spacer"></div>
    <div class="stack">
      <button class="btn" id="verify">Verify I'm real</button>
    </div>`);
  document.getElementById('verify').onclick = async (e)=>{
    e.target.disabled = true;
    try{
      let ok = false;
      if (isEnrolled()) {
        e.target.textContent = 'Waiting for biometric...';
        const { options } = await post('/api/handshake/options', { sessionId });
        const asse = await WA.startAuthentication({ optionsJSON: options });
        const res = await post('/api/handshake/verify', { sessionId, response: asse });
        ok = Boolean(res.verified);
      } else {
        e.target.textContent = 'Waiting for biometric...';
        ok = await enroll(sessionId);
      }
      if (ok){ buzz(30); responderDone(true); }
      else { await post('/api/handshake/fail', { sessionId }); responderDone(false); }
    }catch(err){
      await post('/api/handshake/fail', { sessionId });
      responderDone(false);
    }
  };
}
function responderDone(ok){
  if (ok){
    setBg('green'); bloom(); buzz([20,40,30]);
    render(`<div class="spacer"></div><div class="seal g">✓</div><div class="big fade">You proved you're real.</div><p class="stamp g fade">They can see the green now.</p><p class="stamp g fade" style="opacity:.5;margin-top:6px;letter-spacing:.1em;font-variant-numeric:tabular-nums">VERIFIED ${fmtTime()}</p><div class="spacer"></div>`);
    setBg('green');
  } else {
    render(`<div class="spacer"></div><div class="seal r">✕</div><div class="big fade">No proof sent</div><p class="stamp r fade">You didn't complete a live biometric, so they see red.</p><div class="spacer"></div><button class="btn ghost" id="retry">Try again</button>`);
    setBg('red'); buzz([60,30,60]);
    document.getElementById('retry').onclick = ()=>responder(new URLSearchParams(location.search).get('s'));
  }
}

// ---------- boot ----------
(function boot(){
  if (!WA || !WA.browserSupportsWebAuthn()){
    render(`<div class="spacer"></div><div class="seal r">!</div><div class="big">This browser can't do passkeys.</div><p class="stamp r">Open in Safari (iPhone) or Chrome (Android).</p><div class="spacer"></div>`);
    setBg('red'); return;
  }
  const s = new URLSearchParams(location.search).get('s');
  if (s) responder(s); else home();
})();
</script>
</body>
</html>
