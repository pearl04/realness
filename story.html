<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#07090d">
<title>Realness story</title>
<style>
  :root{
    --bg:#07090d; --panel:#10131a; --panel2:#171b24; --ink:#f7f8fb; --muted:#9ca3b4;
    --line:#2a3040; --green:#22e08a; --red:#ff4d62;
    --li:#0a66c2; --liInk:#1d2226; --liMuted:#56687a; --liLine:#e4e8ed; --liBg:#f4f2ee;
    --focus:#057642;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{min-height:100%}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",Inter,system-ui,sans-serif}
  body.light{background:var(--liBg);color:var(--liInk)}
  button,a{font:inherit}
  a{color:inherit}
  .shell{min-height:100vh;display:flex;flex-direction:column}
  .bar{height:52px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 18px;background:rgba(7,9,13,.92);position:sticky;top:0;z-index:30;backdrop-filter:blur(14px)}
  .brand{letter-spacing:.32em;text-transform:uppercase;font-size:12px;color:var(--muted)}
  .nav{display:flex;gap:8px;align-items:center}
  .nav button,.ghost{border:1px solid var(--line);background:transparent;color:var(--muted);border-radius:8px;padding:8px 11px;cursor:pointer;font-size:13px}
  .nav button:disabled{opacity:.35;cursor:default}
  main{flex:1}

  /* ===== LinkedIn top nav ===== */
  .liTop{position:sticky;top:0;z-index:20;background:#fff;border-bottom:1px solid var(--liLine);height:54px;display:flex;align-items:center;gap:12px;padding:0 16px}
  .liLogo{width:34px;height:34px;border-radius:7px;background:var(--li);color:#fff;display:grid;place-items:center;font-weight:800;font-size:19px;flex:0 0 auto}
  .liSearch{display:flex;align-items:center;gap:8px;background:#edf3f8;border-radius:6px;padding:8px 11px;color:#5f6b76;font-size:14px;min-width:180px;max-width:280px;flex:1}
  .liNav{margin-left:auto;display:flex;gap:22px;align-items:center;color:var(--liMuted)}
  .liNavItem{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:11px}
  .liNavItem.active{color:var(--liInk);border-bottom:2px solid var(--liInk);height:54px;justify-content:center}
  .liNavItem .ic{font-size:17px;line-height:1}
  .liNavItem.me .av{width:24px;height:24px;border-radius:50%;background:linear-gradient(140deg,#ffe0b8,#b5d6ff)}
  @media(max-width:820px){.liNav{display:none}.liSearch{max-width:none}}

  /* ===== Messaging inbox ===== */
  .msgWrap{max-width:1080px;margin:18px auto;padding:0 14px}
  .msgPanel{background:#fff;border:1px solid var(--liLine);border-radius:10px;overflow:hidden}
  .msgPanelHead{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--liLine)}
  .msgPanelHead h2{font-size:17px;margin:0;font-weight:680;color:var(--liInk)}
  .msgSearch{flex:1;max-width:330px;display:flex;align-items:center;gap:8px;background:#edf3f8;border-radius:6px;padding:8px 11px;color:#5f6b76;font-size:14px}
  .msgIcons{margin-left:auto;display:flex;gap:14px;color:var(--liMuted);font-size:17px}
  .msgFilters{display:flex;gap:9px;flex-wrap:wrap;padding:11px 16px;border-bottom:1px solid var(--liLine)}
  .fpill{border:1px solid #b9c2cc;background:#fff;color:var(--liInk);border-radius:999px;padding:6px 14px;font-size:13.5px;font-weight:600}
  .fpill.focused{background:var(--focus);border-color:var(--focus);color:#fff;display:flex;align-items:center;gap:6px}
  .msgGrid{display:grid;grid-template-columns:320px 1fr;min-height:520px}
  .convList{border-right:1px solid var(--liLine);overflow:auto;max-height:560px}
  .convItem{display:flex;gap:12px;padding:12px 14px;border-bottom:1px solid #eef1f4;cursor:pointer}
  .convItem:hover{background:#f3f6f9}
  .convItem.active{background:#eaf1f8;border-left:3px solid var(--focus);padding-left:11px}
  .av{width:46px;height:46px;border-radius:50%;flex:0 0 auto;position:relative;overflow:hidden}
  .av.maya{background:linear-gradient(140deg,#dff3ff,#c7f8d8 52%,#8fa2ff)}
  .av.maya:after{content:"";position:absolute;left:14px;top:11px;width:18px;height:18px;border-radius:50%;background:rgba(36,44,66,.7);box-shadow:0 20px 0 7px rgba(36,44,66,.7)}
  .av.a{background:linear-gradient(140deg,#c7d2fe,#94a3b8)}
  .av.b{background:linear-gradient(140deg,#fde68a,#fca5a5)}
  .av.c{background:linear-gradient(140deg,#bbf7d0,#86efac)}
  .av.d{background:linear-gradient(140deg,#e9d5ff,#a5b4fc)}
  .convMain{min-width:0;flex:1}
  .convTop{display:flex;justify-content:space-between;gap:8px}
  .convName{font-weight:640;color:var(--liInk);font-size:14.5px}
  .convDate{color:var(--liMuted);font-size:12px;white-space:nowrap}
  .convPrev{color:var(--liMuted);font-size:13px;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .convPrev .spon{color:#404a54;font-weight:600}

  .readPane{padding:0}
  .readHead{display:flex;align-items:center;gap:13px;padding:16px 20px;border-bottom:1px solid var(--liLine);cursor:pointer}
  .readHead:hover .rName{color:var(--li)}
  .readHead .av{width:48px;height:48px}
  .rName{font-weight:700;color:var(--liInk);font-size:16px;display:flex;align-items:center;gap:7px}
  .rIn{width:16px;height:16px;border-radius:3px;background:var(--li);color:#fff;display:grid;place-items:center;font-size:9px;font-weight:800}
  .rRole{color:var(--liMuted);font-size:13px;margin-top:2px}
  .rView{margin-left:auto;color:var(--li);font-weight:700;font-size:13px}
  .readBody{padding:20px}
  .msgFrom{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .msgFrom .av{width:42px;height:42px}
  .msgFrom b{color:var(--liInk);font-size:15px}
  .msgFrom .when{color:var(--liMuted);font-size:13px;margin-left:auto}
  .msgText p{color:#1d2226;line-height:1.6;font-size:15px;margin:0 0 14px;max-width:620px}
  .replyHint{margin-top:8px;color:var(--liMuted);font-size:13px}
  @media(max-width:760px){.msgGrid{grid-template-columns:1fr}.convList{display:none}}

  /* ===== Profile ===== */
  .liWrap{max-width:760px;margin:22px auto;padding:0 14px}
  .liCard{background:#fff;border:1px solid var(--liLine);border-radius:10px;overflow:hidden;margin-bottom:14px}
  .liBanner{height:140px;background:linear-gradient(120deg,#0e2a47,#1e5b8a 55%,#2f8f7d)}
  .liHead{padding:0 22px 20px}
  .liAvatar{width:118px;height:118px;border-radius:50%;border:4px solid #fff;background:linear-gradient(140deg,#dff3ff,#c7f8d8 52%,#8fa2ff);margin-top:-62px;position:relative;overflow:hidden}
  .liAvatar:after{content:"";position:absolute;left:34px;top:26px;width:48px;height:48px;border-radius:50%;background:rgba(36,44,66,.72);box-shadow:0 56px 0 19px rgba(36,44,66,.72)}
  .liName{font-size:25px;font-weight:760;margin:10px 0 3px;display:flex;align-items:center;gap:8px}
  .liVerified{width:19px;height:19px;border-radius:50%;background:var(--li);color:#fff;display:grid;place-items:center;font-size:11px}
  .liHeadline{font-size:16px;color:var(--liInk);line-height:1.4}
  .liMeta{color:var(--liMuted);font-size:14px;margin-top:8px;display:flex;flex-wrap:wrap;gap:5px 14px}
  .liMeta b{color:var(--li)}
  .liBtns{display:flex;flex-wrap:wrap;gap:9px;margin-top:16px}
  .liBtn{border:0;background:var(--li);color:#fff;border-radius:999px;padding:9px 18px;font-weight:700;cursor:pointer}
  .liBtn.ghost2{background:#fff;color:var(--li);border:1.5px solid var(--li)}
  .liBtn.muted2{background:#fff;color:var(--liMuted);border:1.5px solid #b9c2cc}
  .liSection{padding:20px 22px}
  .liSection h3{font-size:19px;margin:0 0 12px;font-weight:740;color:var(--liInk)}
  .liSection p,.liSection li{color:#374550;line-height:1.55;font-size:15px}
  .liPost{border:1px solid var(--liLine);border-radius:8px;padding:14px;font-size:15px;line-height:1.55;color:#1d2226}
  .liPost .when{color:var(--liMuted);font-size:13px;margin-bottom:6px}
  .liExp{display:flex;gap:13px;padding:12px 0;border-bottom:1px solid #eef1f4}
  .liExp:last-child{border-bottom:0}
  .liExpLogo{width:46px;height:46px;border-radius:8px;background:#eef3f8;display:grid;place-items:center;font-weight:800;color:var(--li);flex:0 0 auto}
  .liExp b{color:var(--liInk)}
  .liExp .sub2{color:var(--liMuted);font-size:13.5px}
  .liLinkRow{display:flex;align-items:center;gap:11px;padding:12px 14px;border:1px solid #cfe0f3;background:#f3f8ff;border-radius:8px;cursor:pointer}
  .liLinkRow:hover{background:#e9f2fd}
  .liLinkRow .globe{width:34px;height:34px;border-radius:8px;background:var(--li);color:#fff;display:grid;place-items:center;font-weight:800;flex:0 0 auto}
  .liLinkRow .go{margin-left:auto;color:var(--li);font-weight:700;font-size:13px}

  /* ===== browser pages (website / google) ===== */
  .browser{background:#fff;color:#111827;border:1px solid #d9deea;border-radius:10px;overflow:hidden;max-width:840px;margin:24px auto;box-shadow:0 12px 40px rgba(0,0,0,.06)}
  .chrome{height:46px;background:#eef1f6;border-bottom:1px solid #d9deea;display:flex;align-items:center;gap:8px;padding:0 13px}
  .orb{width:10px;height:10px;border-radius:50%;background:#cbd2df}
  .url{flex:1;background:#fff;border:1px solid #d9deea;border-radius:999px;padding:7px 12px;font-size:13px;color:#697386}
  .browserBody{padding:24px}
  .browser h2{font-size:25px;margin:0 0 5px}
  .browser h3{font-size:14px;margin:20px 0 9px;text-transform:uppercase;letter-spacing:.06em;color:#667085}
  .browser p,.browser li{color:#475467;line-height:1.55}
  .pill{display:inline-flex;border:1px solid #d9deea;background:#f7f9fc;border-radius:999px;padding:6px 10px;font-size:12.5px;color:#475467;margin:4px 5px 0 0}
  .searchBox{border:1px solid #d9deea;border-radius:999px;padding:13px 18px;color:#111827;font-size:17px;margin-bottom:18px;display:flex;align-items:center;gap:10px}
  .searchBox .g{font-weight:800;color:#4285f4}
  .result{border-bottom:1px solid #e4e8f0;padding:16px 0}
  .result:last-child{border-bottom:0}
  .result a{color:#1a0dab;font-size:18px;text-decoration:none}
  .result .path{color:#0b7f47;font-size:13px;margin:3px 0}
  .companyHero{background:linear-gradient(120deg,#0e1625,#1a3d5c);color:#fff;padding:28px;border-radius:10px;margin-bottom:20px}
  .companyHero h2{color:#fff}.companyHero p{color:#d9e7ff}
  .barActions{display:flex;flex-wrap:wrap;gap:10px;margin-top:22px;padding-top:18px;border-top:1px solid #e4e8f0}
  .lghost{border:1px solid #d4dae6;background:#fff;color:#475467;border-radius:8px;padding:11px 14px;cursor:pointer;font-weight:600}
  .lghost:active{transform:scale(.99)}

  /* ===== proof (dark) ===== */
  .center{max-width:760px;margin:0 auto;padding:34px 18px 48px}
  .headline{font-size:42px;line-height:1.04;margin:0 0 12px;font-weight:760}
  .sub{color:var(--muted);font-size:17px;line-height:1.55;margin:0 0 22px}
  .stamp{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:999px;padding:8px 11px;color:var(--muted);font-size:13px;margin-bottom:18px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--red);box-shadow:0 0 16px rgba(255,77,98,.6)}
  .tiny{font-size:12.5px;line-height:1.45;color:var(--muted)}
  .checked{display:flex;flex-direction:column;gap:9px;margin:22px 0}
  .checkrow{display:flex;align-items:center;gap:11px;color:var(--muted);font-size:15px}
  .ok{width:22px;height:22px;border-radius:50%;background:#11251c;color:#75ffc0;display:grid;place-items:center;flex:0 0 auto;font-size:13px}
  .reqWrap{margin:26px 0 8px;text-align:center}
  .primary{border:0;border-radius:8px;padding:15px 24px;font-weight:740;font-size:16px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:8px}
  .primary.green{background:var(--green);color:#041109}
  .primary:active{transform:scale(.99)}
  .reqLabel{font-size:13px;color:var(--muted);margin-top:14px}
  .demoSplit{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:18px}
  .demoCard{border:1px solid var(--line);border-radius:10px;background:var(--panel);padding:20px;display:flex;flex-direction:column;gap:10px;cursor:default}
  .demoCard.pass{border-color:rgba(34,224,138,.42);background:rgba(34,224,138,.08)}
  .demoCard.fail{border-color:rgba(255,77,98,.42);background:rgba(255,77,98,.08)}
  .seal{width:50px;height:50px;border-radius:50%;display:grid;place-items:center;font-size:25px;font-weight:780}
  .pass .seal{background:var(--green);color:#031009;box-shadow:0 0 34px rgba(34,224,138,.4)}
  .fail .seal{background:var(--red);color:#240205;box-shadow:0 0 34px rgba(255,77,98,.34)}
  .demoCard h2{font-size:18px;margin:0}
  .footerNote{margin-top:20px;color:var(--muted);font-size:13px;line-height:1.5;text-align:center}
  @media(max-width:760px){.demoSplit{grid-template-columns:1fr}.headline{font-size:32px}}
</style>
</head>
<body>
<div class="shell">
  <div class="bar">
    <div class="brand">Realness</div>
    <div class="nav">
      <button id="back">Back</button>
      <button id="home">Restart</button>
      <a class="ghost" href="https://realness.vercel.app/">Open app</a>
    </div>
  </div>
  <main id="app"></main>
</div>
<script>
const APP_URL = 'https://realness.vercel.app/';
const app = document.getElementById('app');
const back = document.getElementById('back');
const homeBtn = document.getElementById('home');
const stack = [];
const lightRoutes = ['messaging','profile','website','google'];

function go(route){
  if (stack[stack.length-1] !== route) stack.push(route);
  render(route);
}
function render(route){
  document.body.className = lightRoutes.includes(route) ? 'light' : '';
  back.disabled = stack.length <= 1;
  ({messaging:renderMessaging, profile:renderProfile, website:renderWebsite, google:renderGoogle, proof:renderProof}[route] || renderMessaging)();
  window.scrollTo(0,0);
}

function liNav(active){
  const items = [['🏠','Home'],['👥','My Network'],['💼','Jobs'],['💬','Messaging'],['🔔','Notifications']];
  return `<div class="liTop">
    <div class="liLogo">in</div>
    <div class="liSearch">🔍 Search</div>
    <div class="liNav">
      ${items.map(([i,l])=>`<div class="liNavItem ${l===active?'active':''}"><span class="ic">${i}</span>${l}</div>`).join('')}
      <div class="liNavItem me"><span class="av"></span>Me ▾</div>
    </div>
  </div>`;
}

function renderMessaging(){
  app.innerHTML = liNav('Messaging') + `
    <div class="msgWrap">
      <div class="msgPanel">
        <div class="msgPanelHead">
          <h2>Messaging</h2>
          <div class="msgSearch">🔍 Search messages</div>
          <div class="msgIcons"><span>•••</span><span>✎</span></div>
        </div>
        <div class="msgFilters">
          <span class="fpill focused">Focused ▾</span>
          <span class="fpill">Jobs</span>
          <span class="fpill">Unread</span>
          <span class="fpill">Connections</span>
          <span class="fpill">InMail</span>
          <span class="fpill">Starred</span>
        </div>
        <div class="msgGrid">
          <div class="convList">
            <div class="convItem active" id="convMaya">
              <div class="av maya"></div>
              <div class="convMain">
                <div class="convTop"><span class="convName">Maya Sen</span><span class="convDate">9:42 AM</span></div>
                <div class="convPrev">Open to a 12-minute call today?</div>
              </div>
            </div>
            <div class="convItem">
              <div class="av a"></div>
              <div class="convMain">
                <div class="convTop"><span class="convName">Devon Hart</span><span class="convDate">Jun 12</span></div>
                <div class="convPrev">You: Sounds good, talk soon</div>
              </div>
            </div>
            <div class="convItem">
              <div class="av b"></div>
              <div class="convMain">
                <div class="convTop"><span class="convName">Priya Nair</span><span class="convDate">Jun 9</span></div>
                <div class="convPrev">Great catching up earlier today!</div>
              </div>
            </div>
            <div class="convItem">
              <div class="av c"></div>
              <div class="convMain">
                <div class="convTop"><span class="convName">Marcus Lowe</span><span class="convDate">Jun 5</span></div>
                <div class="convPrev"><span class="spon">InMail</span> Quick question about your stack…</div>
              </div>
            </div>
            <div class="convItem">
              <div class="av d"></div>
              <div class="convMain">
                <div class="convTop"><span class="convName">Elena Castro</span><span class="convDate">Jun 4</span></div>
                <div class="convPrev">Thanks for the intro — really helpful</div>
              </div>
            </div>
          </div>
          <div class="readPane">
            <div class="readHead" id="openProfile">
              <div class="av maya"></div>
              <div>
                <div class="rName">Maya Sen <span class="rIn">in</span></div>
                <div class="rRole">Partnerships Lead at Northstar Ventures</div>
              </div>
              <span class="rView">View profile ›</span>
            </div>
            <div class="readBody">
              <div class="msgFrom">
                <div class="av maya"></div>
                <b>Maya Sen</b><span class="when">9:42 AM</span>
              </div>
              <div class="msgText">
                <p>Hi Pearl,</p>
                <p>I came across Realness and your work on proving live human presence. The timing feels unusually sharp.</p>
                <p>I lead partnerships at Northstar Ventures, where we've backed two trust &amp; identity companies. We're actively meeting founders building fraud-resistant consumer infrastructure for the AI-native internet.</p>
                <p>Would you be open to a 12-minute call today? I genuinely think there's a fit.</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>`;
  const open = () => go('profile');
  app.querySelector('#openProfile').onclick = open;
  app.querySelector('#convMaya').onclick = open;
}

function renderProfile(){
  app.innerHTML = liNav('') + `
    <div class="liWrap">
      <div class="liCard">
        <div class="liBanner"></div>
        <div class="liHead">
          <div class="liAvatar"></div>
          <div class="liName">Maya Sen <span class="liVerified" title="Verified">✓</span></div>
          <div class="liHeadline">Partnerships Lead at Northstar Ventures · Trust, identity &amp; security infrastructure</div>
          <div class="liMeta">
            <span>London, United Kingdom</span>
            <span><b>2nd</b> · 18 mutual connections</span>
            <span>500+ connections</span>
          </div>
          <div class="liBtns">
            <button class="liBtn">Message</button>
            <button class="liBtn ghost2">+ Connect</button>
            <button class="liBtn muted2">More</button>
          </div>
        </div>
      </div>

      <div class="liCard liSection">
        <h3>About</h3>
        <p>I work with founders building trust infrastructure for the AI-native internet: identity, fraud prevention, human verification, and agent safety. Previously GTM at Clearcall Security.</p>
        <div class="liLinkRow" id="toSite" style="margin-top:14px">
          <span class="globe">N</span>
          <div><b style="color:var(--li)">northstarventures.co</b><div style="color:var(--liMuted);font-size:13px">Company website</div></div>
          <span class="go">Visit ›</span>
        </div>
      </div>

      <div class="liCard liSection">
        <h3>Activity</h3>
        <div class="liPost">
          <div class="when">Posted 2 days ago · 1,204 impressions</div>
          "The next consumer security primitive won't be another password. It'll be proof that a real person is present when trust matters."
        </div>
      </div>

      <div class="liCard liSection">
        <h3>Experience</h3>
        <div class="liExp">
          <div class="liExpLogo">N</div>
          <div><b>Partnerships Lead</b><div class="sub2">Northstar Ventures · Full-time</div><div class="sub2">2022 – Present · London</div></div>
        </div>
        <div class="liExp">
          <div class="liExpLogo">C</div>
          <div><b>GTM Advisor</b><div class="sub2">Clearcall Security</div><div class="sub2">2020 – 2022</div></div>
        </div>
      </div>
    </div>`;
  app.querySelector('#toSite').onclick = () => go('website');
}

function renderWebsite(){
  app.innerHTML = `
    <div class="browser">
      <div class="chrome"><span class="orb"></span><span class="orb"></span><span class="orb"></span><div class="url">https://northstarventures.co/team/maya-sen</div></div>
      <div class="browserBody">
        <div class="companyHero">
          <h2>Northstar Ventures</h2>
          <p>Backing trust, security, and identity companies for the AI-native internet.</p>
        </div>
        <h3>Team</h3>
        <p><b>Maya Sen</b> leads founder partnerships across trust, consumer safety, and applied identity. She works with early teams turning security into consumer-grade products.</p>
        <h3>Portfolio signals</h3>
        <span class="pill">Identity wallets</span><span class="pill">Fraud prevention</span><span class="pill">Passkey infrastructure</span><span class="pill">Agent security</span>
        <h3>Contact</h3>
        <p>maya@northstarventures.co · London / New York</p>
        <div class="barActions">
          <button class="lghost" id="toGoogle">Search her on Google ›</button>
          <button class="lghost" id="toPoint">What's still missing? ›</button>
        </div>
      </div>
    </div>`;
  app.querySelector('#toGoogle').onclick = () => go('google');
  app.querySelector('#toPoint').onclick = () => go('proof');
}

function renderGoogle(){
  app.innerHTML = `
    <div class="browser">
      <div class="chrome"><span class="orb"></span><span class="orb"></span><span class="orb"></span><div class="url">https://google.com/search?q=Maya+Sen+Northstar+Ventures</div></div>
      <div class="browserBody">
        <div class="searchBox"><span class="g">G</span> Maya Sen Northstar Ventures</div>
        <div class="result">
          <a>Maya Sen — Northstar Ventures</a>
          <div class="path">northstarventures.co › team › maya-sen</div>
          <p>Partnerships Lead focused on trust infrastructure, identity, consumer security, and AI-native fraud prevention.</p>
        </div>
        <div class="result">
          <a>Panel: The Future of Human Trust Online</a>
          <div class="path">trustweek.io › speakers › maya-sen</div>
          <p>Maya Sen joins founders and security leaders to discuss proof of humanity in the agentic web.</p>
        </div>
        <div class="result">
          <a>Northstar Ventures backs consumer identity startup</a>
          <div class="path">ventureledger.com › northstar-identity-seed</div>
          <p>Northstar's Maya Sen says social proof is collapsing as synthetic profiles become cheap to manufacture.</p>
        </div>
        <div class="barActions">
          <button class="lghost" id="toPoint">She checks out everywhere. So what's still missing? ›</button>
        </div>
      </div>
    </div>`;
  app.querySelector('#toPoint').onclick = () => go('proof');
}

function renderProof(){
  app.innerHTML = `
    <div class="center">
      <div class="stamp"><span class="dot"></span>Everything checked out</div>
      <h1 class="headline">It all looks real. That's exactly the problem.</h1>
      <p class="sub">The profile, the company site, the search results, the mutuals — all consistent. But in an AI world, every one of these can be generated, cloned, or seeded. None of them prove a real, live human is on the other end right now.</p>
      <div class="checked">
        <div class="checkrow"><span class="ok">✓</span> LinkedIn profile — convincing, but generatable</div>
        <div class="checkrow"><span class="ok">✓</span> Company website — polished, but cloneable</div>
        <div class="checkrow"><span class="ok">✓</span> Google presence — plausible, but seedable</div>
        <div class="checkrow"><span class="ok">✓</span> Voice &amp; video — increasingly fakeable</div>
      </div>
      <p class="sub" style="margin-bottom:0">There's one signal that's still hard to fake: <b style="color:var(--ink)">live human presence, proven on-device, right now.</b></p>

      <div class="reqWrap">
        <a class="primary green" href="${APP_URL}">Request verification →</a>
        <div class="reqLabel">This sends a live, device-backed human check. One of two things comes back:</div>
      </div>

      <div class="demoSplit" aria-hidden="true">
        <div class="demoCard pass">
          <div class="seal">✓</div>
          <h2>Live human</h2>
          <p class="tiny">They complete a device biometric, live, in the moment. The check turns green.</p>
        </div>
        <div class="demoCard fail">
          <div class="seal">×</div>
          <h2>Not a live human</h2>
          <p class="tiny">They can't — or won't — complete it. It stays red. Could be a bot, a script, or AI.</p>
        </div>
      </div>
      <p class="footerNote">The online evidence can look identical either way. The only difference is whether someone can prove they're a live human right now.</p>
    </div>`;
}

back.onclick = () => { if (stack.length > 1){ stack.pop(); render(stack[stack.length-1]); } };
homeBtn.onclick = () => { stack.length = 0; go('messaging'); };
go('messaging');
</script>
